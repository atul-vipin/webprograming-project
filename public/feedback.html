<!DOCTYPE html>
<html lang="en">
<head>
<title>Feedback</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="navbar">
  <a href="/">Home</a>
  <a href="/register">Login</a>
  <a href="/learn">Learn</a>
  <a href="/assessment">Assessment</a>
  <a href="/feedback.html">Feedback</a>
  <a href="/testimonials.html">Testimonials</a>
  <a href="/contact.html">Contact Us</a>
</div>

<div class="hero">
<h1>User Feedback</h1>
<p>Tell us what worked and what we should improve</p>
</div>

<div class="container">

<form id="feedbackForm" novalidate>

<div class="card">

<label for="feedbackName">Name:</label>
<input type="text" id="feedbackName" name="name" required>

<label for="feedbackEmail">Email:</label>
<input type="email" id="feedbackEmail" name="email" required>

<label for="learned">What did you learn?</label>
<textarea id="learned" name="learned" rows="4" maxlength="240" required></textarea>

<label for="suggestions">Suggestions:</label>
<textarea id="suggestions" name="suggestions" rows="4" maxlength="240" required></textarea>

<label for="rating">Rating</label>
<select id="rating" name="rating" required>
<option value="">Select rating</option>
<option value="Excellent">Excellent</option>
<option value="Good">Good</option>
<option value="Average">Average</option>
<option value="Poor">Poor</option>
</select>

<button type="submit" class="button" style="width:100%">Submit Feedback</button>
<p id="feedbackMessage" role="status" aria-live="polite"></p>

</div>

</form>

</div>

<script src="main.js" defer></script>
</body>
</html>
